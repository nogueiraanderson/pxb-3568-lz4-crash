# PXB-3568: LZ4 Signal 6 crash reproduction
# 3-node PXC 8.0.45 cluster with LZ4 compression enabled for SST
#
# Usage:
#   docker compose up -d              # start cluster
#   docker compose down -v            # teardown

x-pxc-common: &pxc-common
  image: ${PXC_IMAGE:-percona/percona-xtradb-cluster:8.0.45}
  privileged: true
  entrypoint:
    - /bin/bash
    - -c
    - |
      # Write config before the PXC entrypoint runs (must be early
      # enough to disable cluster encryption before SSL cert generation)
      cat > /etc/percona-xtradb-cluster.conf.d/lab.cnf <<'CNF'
      [mysqld]
      pxc_encrypt_cluster_traffic=OFF
      innodb_buffer_pool_size=256M
      innodb_log_file_size=128M
      innodb_flush_log_at_trx_commit=0
      wsrep_sst_method=xtrabackup-v2

      [sst]
      encrypt=0

      [xtrabackup]
      compress=lz4
      compress-chunk-size=65534
      CNF
      exec /entrypoint.sh mysqld
  networks:
    - pxc-net

services:
  pxc-node1:
    <<: *pxc-common
    container_name: lz4-pxc-node1
    hostname: lz4-pxc-node1
    ports:
      - "23306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      CLUSTER_NAME: lz4-test
      CLUSTER_JOIN:
    volumes:
      - node1-data:/var/lib/mysql
      - node1-logs:/var/log

  pxc-node2:
    <<: *pxc-common
    container_name: lz4-pxc-node2
    hostname: lz4-pxc-node2
    ports:
      - "23307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      CLUSTER_NAME: lz4-test
      CLUSTER_JOIN: lz4-pxc-node1
    volumes:
      - node2-data:/var/lib/mysql
      - node2-logs:/var/log

  pxc-node3:
    <<: *pxc-common
    container_name: lz4-pxc-node3
    hostname: lz4-pxc-node3
    ports:
      - "23308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      CLUSTER_NAME: lz4-test
      CLUSTER_JOIN: lz4-pxc-node1
    volumes:
      - node3-data:/var/lib/mysql
      - node3-logs:/var/log

volumes:
  node1-data:
  node2-data:
  node3-data:
  node1-logs:
  node2-logs:
  node3-logs:

networks:
  pxc-net:
    driver: bridge
